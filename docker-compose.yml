version: "3.9"

services:

  database:
    image: mariadb:10.11
    container_name: pterodactyl_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: panel
      MYSQL_USER: pterodactyl
      MYSQL_PASSWORD: pteropass
    volumes:
      - db_data:/var/lib/mysql

  cache:
    image: redis:7-alpine
    container_name: pterodactyl_cache
    restart: unless-stopped

  panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: pterodactyl_panel
    restart: unless-stopped
    depends_on:
      - database
      - cache
    ports:
      - "80:80"
    environment:

      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      APP_TIMEZONE: UTC
      APP_SERVICE_AUTHOR: admin@example.com

      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: pteropass

      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

      REDIS_HOST: cache
      REDIS_PORT: 6379

    command: >
      bash -c "
      apt update &&
      apt install -y default-mysql-client &&
      echo 'Waiting database...' &&
      sleep 15 &&
      php artisan key:generate --force &&
      php artisan migrate --seed --force &&
      php artisan p:user:make --email=admin@example.com --username=admin --name-first=Admin --name-last=User --password=admin --admin=1 ||
      true &&
      php-fpm -D &&
      nginx -g 'daemon off;'
      "

volumes:
  db_data:
